    get:
      tags:
      - ImageStatus
      summary: Get All Statuses
      operationId: getAllStatuses
      description: "Retrieve the status of all image processing jobs.\n\n**Pagination (Highly Recommended):**\nFor better performance and to handle large numbers of statuses, pagination is highly recommended.\
        \ Enable pagination by setting `paginated=true`. When pagination is enabled:\n  - Use the `limit` parameter to control the number of results per page (default: 50, maximum: 100)\n  - Use the `cursor`\
        \ parameter to retrieve subsequent pages\n  - The response will include pagination metadata with `next_cursor` and `has_next_page` fields\n\n**Non-Paginated Response:**\nWhen `paginated=false` (default)\
        \ or omitted, the endpoint returns all statuses **up to 7 days old** as a simple array. This may be slow or fail for accounts with many statuses.\n"
      parameters:
      - name: paginated
        in: query
        required: false
        description: Enable pagination for the response. Highly recommended for better performance.
        schema:
          type: boolean
          default: false
      - name: limit
        in: query
        required: false
        description: Number of results per page when pagination is enabled. Ignored if `paginated=false`. Defaults to 50, maximum is 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      - name: cursor
        in: query
        required: false
        description: Cursor for pagination. Use the `next_cursor` value from the previous response to retrieve the next page. Ignored if `paginated=false`.
        schema:
          type: string
      responses:
        '200':
          description: Statuses of all processes. The response format depends on whether pagination is enabled.
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  description: Non-paginated response (when `paginated=false` or omitted)
                  items:
                    $ref: '#/components/schemas/StatusResponse'
                - $ref: '#/components/schemas/PaginatedStatusesResponse'
              examples:
