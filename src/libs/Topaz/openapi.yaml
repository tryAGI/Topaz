                    output_format: jpeg
                    output_height: 1080
                    output_width: 1920
                    category: Enhance
                    model_type: GAN
                    model: Standard V2
                    crop_to_fill: false
                    status: Completed
                    progress: 100
                    eta: 1617220000
                    creation_time: 1633024800
                    modification_time: 1633038400
                    credits: 2
                paginated:
                  summary: Paginated response
                  value:
                    data:
                    - process_id: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
                      source_id: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
                      filename: image.png
                      input_format: png
                      input_height: 720
                      input_width: 1280
                      output_format: jpeg
                      output_height: 1080
                      output_width: 1920
                      category: Enhance
                      model_type: GAN
                      model: Standard V2
                      crop_to_fill: false
                      status: Completed
                      progress: 100
                      eta: 1617220000
                      creation_time: 1633024800
                      modification_time: 1633038400
                      credits: 2
                    pagination:
                      next_cursor: eyJwcm9jZXNzX2lkIjoiZDdiM2IzYjMzLTdiM2ItNGIzYi04YjNiLTNiM2IzYjNiM2IzYiJ9
                      has_next_page: true
        '400':
          $ref: '#/components/responses/BadRequestProcess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
