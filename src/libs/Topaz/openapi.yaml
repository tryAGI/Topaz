  requestBodies:
    CompleteUpload:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - uploadResults
            properties:
              md5Hash:
                type: string
                description: MD5 hash of the source video file in hex
                example: 4d186321c1a7f0f354b297e8914ab240
              uploadResults:
                type: array
                description: An array of part number and ETag pairs of the uploaded parts. ETags are returned by S3 upon upload of the part.
                items:
                  type: object
                  required:
                  - partNum
                  - eTag
                  properties:
                    partNum:
                      type: integer
                      description: Part number of the uploaded part, starting from 1
                    eTag:
                      type: string
                      description: eTag value returned by S3 upon upload of the part
                example:
                - partNum: 1
                  eTag: ff00a2c854712e4b4765eeefa084baa5-305
                - partNum: 2
                  eTag: 92ee1d92cda0f9f8de4429c9596773aa-34
    CreateRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - source
            - filters
            - output
            properties:
              source:
                type: object
                description: Source details for the video
                required:
                - container
                - size
                - duration
                - frameCount
                - frameRate
                - resolution
                properties:
                  container:
                    type: string
                    enum:
                    - mp4
                    - mov
                    - mkv
                    description: The container format of the video file
                    example: mp4
                  size:
                    type: integer
                    description: Size of the video file in bytes
                    example: 123456000
                  duration:
                    type: number
                    description: Duration of the video file in seconds
                    example: 600
                  frameCount:
                    type: number
                    description: Total number of frames in the video
                    example: 18000
                  frameRate:
                    type: number
                    description: Frame rate of the video
                    example: 30
                  resolution:
                    type: object
                    description: Resolution details of the video
                    required:
                    - width
                    - height
                    properties:
                      width:
                        type: integer
                        description: Width of the video in pixels
                        example: 1920
                      height:
                        type: integer
                        description: Height of the video in pixels
                        example: 1080
                  external:
                    $ref: '#/components/schemas/ExternalStorage'
              filters:
                $ref: '#/components/schemas/InputFilters'
              output:
                $ref: '#/components/schemas/OutputInformationVideo'
              destination:
                type: object
                properties:
                  external:
                    $ref: '#/components/schemas/ExternalStorage'
              notifications:
                type: object
                properties:
                  webhookUrl:
                    type: string
                    description: Your URL for Topaz Labs to POST webhook notifications to. Webhooks are sent on successful completions and processing failures.
                    example: https://www.myvideos.com/webhooks/topazlabs
    CreateExpressRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - source
            - filters
            - output
            properties:
              source:
                type: object
                description: Source details for the video
                required:
                - container
                properties:
                  container:
                    type: string
                    enum:
                    - mp4
                    - mov
                    - mkv
                    description: The container format of the video file
                    example: mp4
                  md5Hash:
                    type: string
                    description: MD5 hash of the source video file in hex
                    example: 5d41402abc4b2a76b9719d911017c592
                  external:
                    $ref: '#/components/schemas/ExternalStorage'
              filters:
                $ref: '#/components/schemas/InputFilters'
              output:
                $ref: '#/components/schemas/OutputInformationVideo'
              destination:
                type: object
                properties:
                  external:
                    $ref: '#/components/schemas/ExternalStorage'
              notifications:
                type: object
                properties:
                  webhookUrl:
                    type: string
                    description: Your URL for Topaz Labs to POST webhook notifications to. Webhooks are sent on successful completions and processing failures.
                    example: https://www.myvideos.com/webhooks/topazlabs
  parameters: {}
