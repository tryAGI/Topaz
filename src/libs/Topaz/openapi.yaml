          - chunkId: 0193b36c-b37f-7997-ab75-c85f61b451e8
            chunkIndex: 0
            taskIndex: 0
            status: processing
            gpuUtilization: 56
            gpuMemoryUtilization: 65
            sampleCount: 20
            currentFrame: 123
            expectedOutputFrames: 320
            latestLogTs: 1727213410471
            currentSize: 123456
            fps: 2.34
            progress: 90
          - chunkId: 0193b36c-b37f-7997-ab75-c85f61b451e9
            chunkIndex: 1
            taskIndex: 0
            status: processing
            gpuUtilization: 65
            gpuMemoryUtilization: 56
            sampleCount: 20
            currentFrame: 123
            expectedOutputFrames: 319
            latestLogTs: 1727213410471
            currentSize: 123456
            fps: 2.34
            progress: 89
        download:
          $ref: '#/components/schemas/EnhancedDownloadSignedUrlResponse'
    SystemStatusResponse:
      type: object
      properties:
        isAvailable:
