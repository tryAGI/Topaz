          - dtv-4
          - dtvs-2
          - gcg-5
          - ghq-5
          - iris-2
          - iris-3
          - nxf-1
          - nxl-1
          - nxhf-1
          - nyx-3
          - prob-4
          - rhea-1
          - thd-3
          - thf-4
          - thm-2
          example: prob-4
        videoType:
          type: string
          enum:
          - Progressive
          - Interlaced
          - ProgressiveInterlaced
          description: Frame/field type of the video
          example: Progressive
        auto:
          type: string
          enum:
          - Auto
          - Manual
          - Relative
          description: 'Parameter mode of the selected model

            - Auto - parameter estimation is used with no customization

            - Relative - uses auto parameters with optional weights added

            - Manual - all parameters are manually set

            '
          example: Auto
        fieldOrder:
          type: string
          enum:
          - TopFirst
          - BottomFirst
          - Auto
          description: Optional specification of field order for interlaced input videos
          example: Auto
        focusFixLevel:
          type: string
          enum:
          - None
          - Normal
          - Strong
          description: Downscales video input for stronger correction of blurred subjects
          example: Normal
        compression:
          type: number
          minimum: -1
          maximum: 1
          description: Adjust strength of compression recovery
          example: 0.1
        details:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of detail reconstruction
          example: 0.2
        prenoise:
          type: number
          minimum: 0
          maximum: 0.1
          description: Adds noise to input to reduce over-smoothing
          example: 0.01
        noise:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of noise reduction
          example: 0.3
        halo:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of halo reduction
          example: 0.4
        preblur:
          type: number
          minimum: -1
          maximum: 1
          description: Adjust anti-aliasing and deblurring strength
          example: 0.5
        blur:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of sharpness applied
          example: 0.6
        grain:
          type: number
          minimum: 0
          maximum: 0.1
          description: Adds grain after AI model processing
          example: 0.02
        grainSize:
          type: number
          minimum: 0
          maximum: 5
          description: Size of generated grain
          example: 1
        recoverOriginalDetailValue:
          type: number
          minimum: 0
          maximum: 1
          description: Reintroduce source details into the output video
          example: 0.7
