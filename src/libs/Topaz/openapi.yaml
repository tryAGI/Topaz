openapi: 3.1.0
info:
  title: Topaz Labs API
  version: 1.0.0
  description: Unified Topaz Labs API covering both image enhancement (upscale, sharpen, denoise, restore, lighting, matting) and video enhancement (upscale, denoise, frame interpolation).
servers:
- url: https://api.topazlabs.com
  description: Production
tags:
- name: Enhance
  description: "Enhance images by removing noise, sharpening, and upscaling while preserving the details of your image, including the faces of important subjects.\n\nJust pass in an image and our **Autopilot**\
    \ will automatically determine the best settings for the highest quality.\n\nAdditional configuration can be optionally provided, specifically:\n  - `model`\n  - `output_height`\n  - `output_width`\n\
    \  - `output_format`\n  - `crop_to_fill`\n\nPlease see the reference for further details. Check out the [available models](https://developer.topazlabs.com/image-api/available-models) to see which model\
    \ options you have.\n"
- name: Sharpen
  description: "Use our advanced Sharpen models to bring clarity and crisp definition back to your images that appear soft or slightly out of focus. By analyzing the edges, textures, and details, our AI-based\
    \ Sharpen endpoint intelligently enhances the clarity without introducing unwanted artifacts. Whether your image is suffering from camera shake, slight motion blur, or lens softness, Topaz Labs' Sharpen\
    \ models help you restore the finer details with minimal effort.\n\nJust pass in an image and our **Autopilot** will automatically determine the best settings for the highest quality.\n\nAdditional\
    \ configuration can be optionally provided, specifically:\n  - `model`\n  - `output_format`\n\nPlease see the reference for further details. Check out the [available models](https://developer.topazlabs.com/image-api/available-models)\
    \ to see which model options you have.\n"
- name: Denoise
  description: "Our noise reduction models effectively remove grain and high-ISO noise from your photos, ensuring smooth yet detailed results. This endpoint is particularly beneficial when working with\
    \ low-light photography or older images scanned from film, as it preserves essential image structure while greatly reducing unwanted noise or artifacts.\n\nJust pass in an image and our **Autopilot**\
    \ will automatically determine the best settings for the highest quality.\n\nAdditional configuration can be optionally provided, specifically:\n  - `model`\n  - `output_format`\n\nPlease see the reference\
    \ for further details. Check out the [available models](https://developer.topazlabs.com/image-api/available-models) to see which model options you have.\n"
- name: Restore
  description: "Our restoration models are designed to enhance photos that are older and of poorer quality.\n\nJust pass in an image and our **Autopilot** will automatically determine the best settings\
    \ for the highest quality.\n\nAdditional configuration can be optionally provided, specifically:\n  - `model`\n  - `output_format`\n\nPlease see the reference for further details. Check out the [available\
    \ models](https://developer.topazlabs.com/image-api/available-models) to see which model options you have.\n"
- name: Lighting
  description: "Our lighting models are used to adjust and balance your images to elevate it's quality despite the sub-optimal lighting conditions of the original photo.\n\nJust pass in an image and our\
    \ **Autopilot** will automatically determine the best settings for the highest quality.\n\nAdditional configuration can be optionally provided, specifically:\n  - `model`\n  - `output_format`\n\nPlease\
    \ see the reference for further details. Check out the [available models](https://developer.topazlabs.com/image-api/available-models) to see which model options you have.\n"
- name: Matting
  description: "Extract subjects from images using advanced AI matting technology. Generate alpha masks or segmentation maps to isolate objects from their backgrounds with precision.\n\nJust pass in an\
    \ image and our **Autopilot** will automatically determine the best settings for the highest quality.\n\nAdditional configuration can be optionally provided, specifically:\n  - `model`\n  - `mode`\n\
    \  - `output_format`\n\nPlease see the reference for further details.\n"
- name: Tool
  description: "Specialized image processing tools for specific use cases, including upscaling images with transparent backgrounds upto 4x while preserving alpha channels.\n\nJust pass in an image and our\
    \ **Autopilot** will automatically determine the best settings for the highest quality.\n\nAdditional configuration can be optionally provided, specifically:\n  - `model`\n  - `output_height`\n  - `output_width`\n\
    \  - `output_format`\n  - `crop_to_fill`\n\nPlease see the reference for further details.\n"
- name: ImageStatus
  description: 'Check and manage the statuses of your image processing jobs. Whether you are handling a single job or managing a queue of bulk image processing tasks, the Status endpoints allow you to monitor
    the progress and completion of your tasks.


    This is particularly useful for long-running jobs, where you can track progress and retrieve details such as percentage completion, estimated finish time, and current state (e.g., pending, processing,
    completed).

    '
- name: Download
  description: 'Access presigned URLs for downloading input or processed images. These endpoints allow you to securely retrieve the input or the processed image with an expiring URL.

    '
- name: Estimate
  description: 'Our estimates will allow you to predict the amount of time required and the number of credits that would be consumed in order to run a set of enhancements on a given image with certain input
    parameters.

    '
- name: Cancel
  description: 'If an image processing job is no longer needed or was started in error, you can cancel it before it completes. The job must be in a cancellable state (e.g., not already completed or failed)
    for the request to be successful.

    '
- name: VideoStatus
  description: 'This section informs you about the system status

    '
- name: Create Request
  description: 'This section allows you to create a request and estimate costs

    '
- name: Create Express Request
  description: 'This section allows you to create an express request

    '
- name: Accept Request
  description: 'This section allows you to accept the created request''s cost and upload the source video

    '
- name: Complete Upload
  description: 'This section allows you to complete the multi-part upload and start processing

    '
- name: Cancel Request
  description: 'This section allows you to cancel a request

    '
- name: Delete Files
  description: 'This section allows you to delete your source and enhanced files

    '
- name: Get Request Status
  description: 'This section allows you to get the status of a request

    '
- name: Get Request Metrics
  description: 'This section allows you to get the metrics for a request

    '
- name: Get Request History
  description: 'This section allows you to get your video request history

    '
paths:
  /image/v1/enhance/async:
    post:
      tags:
      - Enhance
      summary: Enhance
      operationId: postEnhance
      description: "Returns `process_id` and `eta` to use as an efficient way to track the progress of the image enhancement job:\n  - Use the `Status` endpoints to check the status of this job using the\
        \ returned `process_id`.\n  - Use the `Download` endpoints to download the input or processed image (once it is ready).\n  - Use the `Cancel` endpoint to cancel the job while it is in progress.\n\
        \nThe same `process_id` and `eta` are also returned in the response headers as `X-Process-ID` and `X-ETA` respectively.\n\n> The `eta` represents when the job is expected to finish in Unix time.\
        \ We recommend using this to know when you can expect your (bulk) jobs to finish processing.\n"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EnhanceGANRequest'
      responses:
        '200':
          description: Image processing request has been successfully created.
          headers:
            X-Process-ID:
              description: Unique identifier of the image processing job.
              schema:
                type: string
                examples:
                - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
            X-Source-ID:
              description: Unique identifier of the source image.
              schema:
                type: string
                examples:
                - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
            X-ETA:
              description: Estimated time of arrival (ETA) for the process to complete in Unix time.
              schema:
                type: integer
                examples:
                - 1617220000
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncResponse'
          links:
            GetStatusByProcessId:
              description: Retrieve the status of your image processing job using the `process_id`.
              operationId: getStatus
              parameters:
                process_id: $response.header.X-Process-ID
            DownloadInputByProcessId:
              description: Access the download link for the input image once the job is completed.
              operationId: getDownloadInput
              parameters:
                process_id: $response.header.X-Process-ID
            DownloadOutputByProcessId:
              description: Access the download link for the enhanced image once the job is completed.
              operationId: getDownloadOutput
              parameters:
                process_id: $response.header.X-Process-ID
            CancelByProcessId:
              description: Cancel the image processing job if it is still in progress.
              operationId: cancelTask
              parameters:
                process_id: $response.header.X-Process-ID
        '400':
          $ref: '#/components/responses/BadRequestImage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '403':
          $ref: '#/components/responses/Forbidden'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '425':
          $ref: '#/components/responses/TooEarly'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
