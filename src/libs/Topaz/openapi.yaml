      - process_id
      - filename
      - input_format
      - input_height
      - input_width
      - output_format
      - output_height
      - output_width
      - category
      - model_type
      - model
      - crop_to_fill
      - status
      - progress
      - eta
      - creation_time
      - modification_time
      - credits
      properties:
        process_id:
          type: string
          description: Unique identifier of the image processing job.
          examples:
          - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        source_id:
          type: string
          description: Unique identifier of the source image.
          examples:
          - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        filename:
          type: string
          description: Name of the file being processed.
          examples:
          - image.png
        input_format:
          type: string
          description: Format of the input file.
          examples:
          - png
        input_height:
          type: integer
          description: Height of the input image in pixels.
          examples:
          - 720
        input_width:
          type: integer
          description: Width of the input image in pixels.
          examples:
          - 1280
        output_format:
          type: string
          description: Format of the output file.
          examples:
          - jpeg
        output_height:
          type: integer
          description: Height of the output image in pixels.
          examples:
          - 1080
        output_width:
          type: integer
          description: Width of the output image in pixels.
          examples:
          - 1920
        category:
          type: string
          description: Category of model used for processing.
          examples:
          - Enhance
        model_type:
          type: string
          description: Type of model used for processing.
          examples:
          - GAN
        model:
          type: string
          description: Model used for processing.
          examples:
          - Standard V2
        subject_detection:
          type: string
          description: Level of subject detection.
          examples:
          - All
        face_enhancement:
          type: boolean
          description: Whether face enhancement is enabled.
          examples:
          - true
        face_enhancement_creativity:
          type: number
          description: Level of face enhancement creativity (if enabled).
          examples:
          - 0
        face_enhancement_strength:
          type: number
          description: Level of face enhancement strength (if enabled).
          examples:
          - 0.8
        crop_to_fill:
          type: boolean
          description: Whether cropping to fill is enabled.
          examples:
          - false
        options_json:
          type: string
          description: Additional options in JSON format.
          examples:
          - '{"creativity": 90}'
        status:
          type: string
          description: Status of the job.
          enum:
          - Pending
          - Processing
          - Completed
          - Cancelled
          - Failed
          examples:
          - Completed
        progress:
          type: integer
          description: Progress of the job as a percentage. Useful for displaying a progress bar or loading spinners etc.
          minimum: 0
          maximum: 100
          examples:
          - 100
        eta:
          type: integer
          description: Estimated time of arrival (ETA) for the process to complete in Unix time.
          examples:
          - 1617220000
        creation_time:
          type: integer
          description: Creation time of the job in Unix epoch format.
          examples:
          - 1633024800
        modification_time:
          type: integer
          description: Last modification time of the job in Unix epoch format.
          examples:
          - 1633038400
        credits:
          type: integer
          description: Credits (to be) consumed on image processing completion.
          examples:
          - 2
    DownloadResponse:
      type: object
      required:
      - head_url
      - download_url
      - expiry
      properties:
        download_url:
          type: string
          description: The presigned URL for downloading the image. This URL is temporary and will **expire after 1 hour**.
          examples:
          - https://<...>/d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b?<presigned_headers>
        head_url:
          type: string
          description: The presigned URL for fetching the metadata of the image's file. Useful for retrieving the image's size before download. This URL is temporary and will **expire after 1 hour**.
          examples:
          - https://<...>/d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b?<presigned_headers>
        expiry:
          type: integer
          description: The expiration time (in Unix epoch) of the presigned download link, set as 1 hour after download link generation. After this time, the link will no longer be valid.
          examples:
          - 1617220000
    EstimationResponse:
      type: object
      required:
      - duration
      - credits
      properties:
        duration:
          type: integer
          description: The estimated time taken in seconds for the image to be enhanced with the given parameters.
          minimum: 0
          examples:
          - 30
        credits:
          type: integer
          description: The number of credits that would be consumed if the given requests was executed.
          minimum: 1
          examples:
          - 2
    EstimationBulkResponse:
      type: array
      items:
        oneOf:
        - type: object
          required:
          - duration
          - credits
          - status
          properties:
            duration:
              type: integer
              description: The estimated time taken in seconds for the image to be enhanced with the given parameters.
              minimum: 0
              examples:
              - 30
            credits:
              type: integer
              description: The number of credits that would be consumed if the given requests was executed.
              minimum: 1
              examples:
              - 2
            status:
              type: string
              enum:
              - success
              description: Indicates that the estimation for this item in the bulk request was successful.
              examples:
              - success
        - type: object
          required:
          - status
          - code
          - message
          properties:
            status:
              type: string
              enum:
              - error
              description: Indicates that an error occurred while processing this item in the bulk request.
              examples:
              - error
            code:
              type: integer
              description: HTTP-like error code
              examples:
              - 413
            message:
              type: string
              description: Error message
              examples:
              - Output image dimensions exceed maximum allowed of 256 MP.
    PaginationMetadata:
      type: object
      required:
      - has_next_page
      properties:
        next_cursor:
          type: string
          description: The cursor to use for retrieving the next page of results. Omitted if there are no more pages.
          examples:
          - eyJwcm9jZXNzX2lkIjoiZDdiM2IzYjMzLTdiM2ItNGIzYi04YjNiLTNiM2IzYjNiM2IzYiJ9
        has_next_page:
          type: boolean
          description: Indicates whether there are more pages of results available.
          examples:
          - true
    PaginatedStatusesResponse:
      type: object
      required:
      - data
      - pagination
      properties:
        data:
          type: array
          description: Array of status responses for the current page.
          items:
            $ref: '#/components/schemas/StatusResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'
    AcceptResponse:
      type: object
      properties:
        uploadId:
          type: string
          description: Upload ID for completing multi-part upload
          example: GDlWC7qIaE6okS41Xf/ktpuS5XzTRabg
        urls:
          type: array
          description: URLs to PUT the parts to. The source video should be split into urls.length number of byte ranges.
          items:
            type: string
          example:
          - https://videocloud.s3.amazonaws.com/0193893a-a2ba-799e-b258-928f02c0f419/source.mp4?X-Amz-Algorithm=AWS4-HMAC-SHA256...x-id=UploadPart
          - https://videocloud.s3.amazonaws.com/0193893a-a2ba-799e-b258-928f02c0f419/source.mp4?X-Amz-Algorithm=AWS4-HMAC-SHA256...x-id=UploadPart
        message:
          type: string
          description: The endpoint will return message only if the video will be sourced from an external storage provider
          example: Accepted
    ChunkMetrics:
      type: object
      properties:
        chunkIndex:
          type: integer
          description: Index of the chunk starting from 0
          example: 0
        tasks:
          type: array
          description: Multiple enhancement tasks may have been run on a chunk
          items:
            type: object
            properties:
              minutesProcessing:
                type: number
                example: 12.3
              inputFrames:
                type: integer
                example: 320
              outputFrames:
                type: integer
                example: 320
              inputSize:
                type: string
                example: 100 MB
              outputSize:
                type: string
                example: 200 MB
    CreateResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        estimates:
          $ref: '#/components/schemas/RequestEstimates'
    CreateExpressResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        uploadId:
          type: string
          description: Upload ID for completing multi-part upload
          example: GDlWC7qIaE6okS41Xf/ktpuS5XzTRabg
        uploadUrls:
          type: array
          description: URL to PUT the parts to
          items:
            type: string
          example:
          - https://videocloud.s3.amazonaws.com/0193893a-a2ba-799e-b258-928f02c0f419/source.mp4?X-Amz-Algorithm=AWS4-HMAC-SHA256...x-id=PutObject
    CredentialsS3:
      type: object
      required:
      - roleArn
      - externalId
      properties:
        roleArn:
          type: string
          description: AWS ARN of the role to assume
          example: arn:aws:iam::123456789:role/topazlabs
        externalId:
          type: string
          description: Kind of like a secret string for extra layer of security
          example: MSTnuGztXtTU25XKjVfMJCsujv6VtAGtv1TGSjtOL6M=
    EnhancedDownloadSignedUrlResponse:
      type: object
      description: Signed download URL to the enhanced video file.
      properties:
        url:
          type: string
          example: https://videocloud.r2.cloudflarestorage.com/0193893a-a2ba-799e-b258-928f02c0f419/enhanced.mp4?X-Amz-Algorithm=AWS4-HMAC-SHA256...x-id=GetObject
        expiresIn:
          type: integer
          description: TTL in milliseconds
          example: 86400000
        expiresAt:
          type: integer
          description: Time in milliseconds since UTC epoch
          example: 1727213400000
    ExternalStorage:
      type: object
      required:
      - provider
      - credentials
      - bucketName
      - key
      properties:
        provider:
          type: string
          enum:
          - s3
          example: s3
        presignedUrl:
          type: string
          description: Presigned URL to download the source video from or upload the output video to
          example: https://videocloud.s3.amazonaws.com/0193893a-a2ba-799e-b258-928f02c0f419/output.mp4?X-Amz-Algorithm=AWS4-HMAC-SHA256...x-id=PutObject
        awsCredentials:
          $ref: '#/components/schemas/CredentialsS3'
        bucketName:
          type: string
          example: galaxies
        key:
          type: string
          description: 'The example includes the standard specifier for image sequence requests, with optional directory path. It must begin with "%" and end with the integer specifier "d". The "0" in the
            example indicates left-padding with zeroes, and "6" indicates the number of digits in the file name.

            Keys for video requests must be valid characters supported by S3.

            '
          example: milky_way/%06d.tiff
    FrameInterpolationFilter:
      title: Frame Interpolation Filter
      type: object
      required:
      - model
      properties:
        model:
          type: string
          description: 'Short code name for the AI model

            '
          enum:
          - apf-2
          - apo-8
          - chf-3
          - chr-2
          example: apo-8
        slowmo:
          type: number
          minimum: 1
          maximum: 16
          description: Slow motion factor applied to input video. For example, a value of 2 makes the output twice as slow and doubles the duration.
          example: 2
        fps:
          type: number
          minimum: 15
          maximum: 240
          description: Output frame rate, does not increase duration
          example: 60
        duplicate:
          type: boolean
          description: Analyze input for duplicate frames and remove them
          example: true
        duplicateThreshold:
          type: number
          minimum: 0.001
          maximum: 0.1
          description: Sensitivity of detection for duplicate frames
          example: 0.01
    HistoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique request identifier
        userId:
          type: number
        status:
          type: string
          enum:
          - requested
          - accepted
          - initializing
          - preprocessing
          - processing
          - postprocessing
          - complete
          - canceling
          - canceled
          - failed
        ts:
          type: object
          description: Timestamp the request reached the state, if applicable, in milliseconds since UTC epoch
          properties:
            requested:
              type: number
              description: Request created
            accepted:
              type: number
              description: User has accepted the costs and began uploading the source video
            initializing:
              type: number
              description: System received the source video and began initializing resources
            preprocessing:
              type: number
            processing:
              type: number
            postprocessing:
              type: number
            complete:
              type: number
            canceling:
              type: number
            canceled:
              type: number
            failed:
              type: number
        lastEventTs:
          type: number
          description: Timestamp of the last event, in milliseconds since UTC epoch
        estimates:
          $ref: '#/components/schemas/RequestEstimates'
        transactions:
          type: array
          items:
            type: object
            properties:
              operation:
                type: string
                enum:
                - reserve
                - commit
                - rollback
              amount:
                type: number
                description: Amount involved in the transaction, in credits
        error:
          type: object
          description: Error message, if the request was a failure
          properties:
            message:
              type: string
    InputFilters:
      type: array
      description: Array of UpscaleFilter or FrameInterpolationFilter objects
      items:
        anyOf:
        - $ref: '#/components/schemas/UpscaleFilter'
        - $ref: '#/components/schemas/FrameInterpolationFilter'
      example:
      - model: prob-4
        videoType: Progressive
        auto: Auto
        fieldOrder: Auto
        focusFixLevel: Normal
        compression: 0.1
        details: 0.2
        prenoise: 0.01
        noise: 0.3
        halo: 0.4
        preblur: 0.5
        blur: 0.6
        grain: 0.02
        grainSize: 1
        recoverOriginalDetailValue: 0.7
      - model: apo-8
        slowmo: 2
        fps: 60
        duplicate: true
        duplicateThreshold: 0.01
    MetricsResponse:
      type: object
      properties:
        minutesInState:
          type: object
          properties:
            pendingSourceUpload:
              type: number
              example: 1.23
            initializing:
              type: number
              example: 1.23
            preprocessing:
              type: number
              example: 1.23
            processing:
              type: number
              example: 3.21
            postprocessing:
              type: number
              example: 3.21
        minutesToEnhance:
          type: number
          description: Time taken for the final enhanced video to become available for download after user finished uploading the source video.
          example: 12.34
        inputFrames:
          type: integer
          example: 3000
        outputFrames:
          type: integer
          example: 3000
        inputSize:
          type: string
          example: 300 MB
        outputSize:
          type: string
          example: 400 MB
        chunks:
          type: array
          description: Metrics for each chunk
          items:
            $ref: '#/components/schemas/ChunkMetrics'
          example:
          - chunkIndex: 0
            tasks:
            - minutesProcessing: 12.3
              inputFrames: 320
              outputFrames: 320
              inputSize: 100 MB
              outputSize: 200 MB
          - chunkIndex: 1
            tasks:
            - minutesProcessing: 12.2
              inputFrames: 319
              outputFrames: 319
              inputSize: 99 MB
              outputSize: 199 MB
    OutputInformationImageSequence:
      type: object
      required:
      - resolution
      - frameRate
      properties:
        resolution:
          type: object
          description: Desired output resolution
          required:
          - width
          - height
          properties:
            width:
              type: integer
              description: Width in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr>
                <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>16384</td> <td>8192</td> </tr> </table>
              example: 7680
            height:
              type: integer
              description: Height in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr>
                <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>8704</td> <td>8192</td> </tr> </table>
              example: 4320
        frameRate:
          type: number
          description: Frame rate
          example: 30
        codecId:
          type: string
          description: Video codec ID, if known. Defaults to videoEncoder.
          example: h265-main-win-nvidia
        videoEncoder:
          type: string
          enum:
          - DPX
          - EXR
          - JPEG
          - PNG
          - TIFF
          example: TIFF
        videoProfile:
          type: string
          description: Codec profile specific to videoEncoder
          example: Main
        cropToFit:
          type: boolean
          description: Center cropping to fit the output dimensions
          example: true
        container:
          type: string
          enum:
          - DPX
          - EXR
          - JPEG
          - PNG
          - TIFF
          description: Desired output container, defaults to the input container
          example: TIFF
    OutputInformationVideo:
      type: object
      required:
      - resolution
      - frameRate
      - audioCodec
      - audioTransfer
      properties:
        resolution:
          type: object
          description: Desired output resolution
          required:
          - width
          - height
          properties:
            width:
              type: integer
              description: Width in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr>
                <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>16384</td> <td>8192</td> </tr> </table>
              example: 7680
            height:
              type: integer
              description: Height in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr>
                <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>8704</td> <td>8192</td> </tr> </table>
              example: 4320
        frameRate:
          type: number
          description: Frame rate
          example: 30
        audioBitrate:
          type: string
          description: Audio bitrate, if audioTransfer is Copy or Convert. Default values for the codec are used if not provided.
          example: '320'
        audioCodec:
          type: string
          enum:
          - AAC
          - AC3
          - PCM
          description: __Required if audioTransfer is Copy or Convert.__
          example: AAC
        audioTransfer:
          type: string
          enum:
          - Copy
          - Convert
          - None
          example: Copy
        codecId:
          type: string
          description: Video codec ID, if known. Defaults to videoEncoder.
          example: h265-main-win-nvidia
        videoEncoder:
          type: string
          enum:
          - AV1
          - H264
          - H265
          - VP9
          example: H265
        videoBitrate:
          type: string
          description: __Required if dynamicCompressionLevel is not provided.__ Constant bitrate, suffixed with "k" for kilobits or "m" for megabits per second.
          example: 1k
        dynamicCompressionLevel:
          type: string
          enum:
          - Low
          - Mid
          - High
          description: __Required if videoBitrate is not provided.__ Automatic CQP selection.
          example: Mid
        videoProfile:
          type: string
          description: Codec profile specific to videoEncoder. The following are some combinations of available profiles based on the 'videoEncoder' selection <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes
            <td>AV1 <td>VP9 </tr> <tr> <td>High</td> <td>Main, Main10</td> <td>422 Proxy, 422 LT, 422 Std, 422 HQ</td> <td>8-bit, 10-bit</td> <td>Good, Best</td> </tr> </table>
          example: Main
        cropToFit:
          type: boolean
          description: Center cropping to fit the output dimensions
          example: true
        container:
          type: string
          enum:
          - mp4
          - mov
          - mkv
          description: Desired output container
          example: mp4
    ProcessingStatIntermediate:
      type: array
      description: Processing state for each chunk
      items:
        type: object
        properties:
          chunkId:
            type: string
            format: uuid
            example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
          chunkIndex:
            type: integer
            description: Index of the chunk starting from 0
            example: 0
          taskIndex:
            type: integer
            description: Index of a chunk's enhancement task starting from 0
            example: 0
          status:
            type: string
            enum:
            - queued
            - processing
            - complete
            - canceled
            - failed
            example: processing
          gpuUtilization:
            type: number
            description: In percentage
            example: 56
          gpuMemoryUtilization:
            type: number
            description: In percentage
            example: 65
          sampleCount:
            type: integer
            description: The number of latest processing stat records used in the average calculation
            example: 20
          currentFrame:
            type: integer
            example: 123
          expectedOutputFrames:
            type: integer
            description: This value and currentFrame is used to calculate the progress %
            example: 320
          latestLogTs:
            type: integer
            description: Timestamp of the latest stat record in milliseconds since UTC epoch
            example: 1727213410471
          currentSize:
            type: integer
            description: In bytes
            example: 123456
          fps:
            type: number
            description: Processing speed of the node
            example: 2.34
          progress:
            type: number
            description: In percentage
            example: 90
    RequestEstimates:
      type: object
      description: Lower and upper bound estimates
      properties:
        cost:
          type: array
          description: In credits
          items:
            type: integer
          example:
          - 10
          - 12
        time:
          type: array
          description: In seconds, assuming an empty queue, starting from the time the source video has been received
          items:
            type: integer
          example:
          - 600
          - 700
    VideoStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - requested
          - accepted
          - initializing
          - preprocessing
          - processing
          - postprocessing
          - complete
          - canceling
          - canceled
          - failed
          example: processing
        progress:
          type: number
          description: Total progress of the request in percentage
          example: 82
        estimates:
          $ref: '#/components/schemas/RequestEstimates'
        outputSize:
          type: string
          example: 10 GB
        averageFps:
          type: number
          description: Average processing speed of each node
          example: 1.23
        combinedFps:
          type: number
          description: Combined processing speed of all nodes
          example: 12.34
        message:
          type: string
          example: Processing
        processingJobs:
          $ref: '#/components/schemas/ProcessingStatIntermediate'
