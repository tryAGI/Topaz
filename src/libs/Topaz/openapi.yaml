  /video/:
    post:
      tags:
      - Create Request
      summary: Create Video Request
      operationId: CreateVideoRequest
      description: 'Create a new video enhancement request.


        Send information about the video and desired enhancements then receive cost and time estimates.


        Calling this endpoint does NOT consume credits.


        Calling this endpoint does NOT start processing.


        Estimations are based on values provided, and the calculation is rerun once the system receives the source video. If the second estimate is significantly different than the initial values, the request
        is failed and the credits are fully refunded.


        The lower bound value of the cost estimate is billed.


        Time estimates are in development and may not be accurate.


        ## Response body


        | **Property**  | **Type** | **Description**                     |

        |---------------|----------|-------------------------------------|

        | **requestId** | UUID     | Unique request identifier           |

        | **estimates** | Object   | Refer to **RequestEstimates** below |


        #### RequestEstimates


        `cost` and `time` are arrays with two integers each, representing lower and upper bounds of the estimate.


        | **Property** | **Type** | **Description**         |

        |--------------|----------|-------------------------|

        | **cost**     | Array    | Cost range (in credits) |

        | **time**     | Array    | Time range (in seconds) |

        '
      security:
      - apiKey: []
      requestBody:
        $ref: '#/components/requestBodies/CreateRequest'
        example:
          source:
            container: mp4
            size: 16125151
            duration: 213
            frameCount: 6371
            frameRate: 30
            resolution:
              width: 1280
              height: 720
          filters:
          - model: prob-4
          output:
            frameRate: 30
            audioTransfer: Copy
            audioCodec: AAC
            videoEncoder: H265
            videoProfile: Main
            dynamicCompressionLevel: High
            resolution:
              width: 3840
              height: 2160
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        '400':
          $ref: '#/components/responses/VideoBadRequest'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
        '503':
          $ref: '#/components/responses/VideoServiceUnavailable'
  /video/express:
    post:
      tags:
      - Create Express Request
      summary: Create Express Video Request
      operationId: CreateExpressVideoRequest
      description: 'Simplified interface for creating new video enhancement requests.


        This endpoint skips the need to gather video information and uses a single-URL upload rather than multi-part upload. Calling the accept and complete-upload endpoints are also no longer necessary.


        This endpoint does not return the cost estimates. Once the system receives and analyzes the source video file, cost estimates will appear in the response of the status endpoint. The lower bound
        value will be billed.


        The endpoint returns a direct upload URL to our cloud storage for you to HTTP PUT the video file to.


        ## Response body


        | **Property**   | **Type** | **Description**            |

        |----------------|----------|----------------------------|

        | **requestId**  | UUID     | Unique request identifier  |

        | **uploadId**   | String   | Upload identifier          |

        | **uploadUrls** | Array    | URL(s) for uploading video |

        '
      security:
      - apiKey: []
      requestBody:
        $ref: '#/components/requestBodies/CreateExpressRequest'
        example:
          source:
            container: mp4
          filters:
          - model: prob-4
          output:
            resolution:
              width: 3840
              height: 2160
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateExpressResponse'
        '400':
          $ref: '#/components/responses/VideoBadRequest'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
        '503':
          $ref: '#/components/responses/VideoServiceUnavailable'
  /video/{requestId}/accept:
    patch:
      tags:
      - Accept Request
      summary: Accept and Upload Video Request
      operationId: AcceptVideoRequest
      description: 'Calling this endpoint reserves the estimated credits and returns signed URL(s) for **multi-part upload**.


        ### Video uploads

        The Video API uses multi-part upload to receive the video file for processing. You can use a simple byte-division function to create segments for the API to receive.


        For example, if you have a 900MB video file and the system returns 3 upload URLs. You would then:


        - Upload bytes 0-300,000,000 via HTTP PUT to `urls[0]`

        - Upload bytes 300,000,001-600,000,000 via HTTP PUT to `urls[1]`

        - Upload bytes 600,000,001-900,000,000 via HTTP PUT to `urls[2]`


        If one of the uploads fail, you may reuse the same URL to retry - the action overwrites any partially uploaded data.


        A successful response from the PUT request returns an `ETag` value in the header for each segment. Retain the part number and ETag pair for the next step (PATCH /video/{requestId}/complete-upload/).


        ## Response body


        | **Property**  | **Type**   | **Description**                                     |

        |---------------|------------|-----------------------------------------------------|

        | **uploadId**  | String     | Upload ID for multi-part upload                     |

        | **urls**      | Array      | URLs for multi-part uploads                         |

        '
      security:
      - apiKey: []
      parameters:
      - in: path
        name: requestId
        schema:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        required: true
      responses:
        '202':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptResponse'
        '400':
          $ref: '#/components/responses/VideoBadRequest'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '402':
          $ref: '#/components/responses/VideoPaymentRequired'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '404':
          $ref: '#/components/responses/VideoNotFound'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
        '503':
          $ref: '#/components/responses/VideoServiceUnavailable'
  /video/{requestId}/complete-upload/:
    patch:
      tags:
      - Complete Upload
      summary: Complete Video Upload
      operationId: CompleteVideoUpload
      description: "Send metadata of the multi-part uploads to complete the upload and begin processing the video.\n\nOptionally include the MD5 hash of the source video file to validate successful upload\
        \ before processing.\n\n## Request body\n\n| **Property**    | **Type**         | **Description**                                                                                         |\n|-----------------|------------------|---------------------------------------------------------------------------------------------------------|\n\
        | **uploadResults**           | Array   | An array of part number and ETag pairs of the uploaded parts. ETags are returned by S3 upon upload of the part. |\n| **uploadResults.*.partNum** | Integer\
        \ | Part number of the uploaded part, starting from 1                                                      |\n| **uploadResults.*.eTag**    | String  | eTag value returned by S3 upon upload of the\
        \ part   \n"
      security:
      - apiKey: []
      parameters:
      - in: path
        name: requestId
        schema:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        required: true
      requestBody:
        $ref: '#/components/requestBodies/CompleteUpload'
      responses:
        '202':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Processing has been queued
        '400':
          $ref: '#/components/responses/VideoBadRequest'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '404':
          $ref: '#/components/responses/VideoNotFound'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
  /video/{requestId}:
    delete:
      tags:
      - Cancel Request
      summary: Cancel Video Request
      operationId: CancelVideoRequest
      description: 'Cancel a video enhancement request.


        If the request is canceled before any processing starts, then all reserved credits are refunded.


        If the request is canceled during processing, then a partial refund is issued based on the progress. For example, if the request is 50% complete, then approximately 50% of the reserved credits are
        refunded.

        '
      security:
      - apiKey: []
      parameters:
      - in: path
        name: requestId
        schema:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        required: true
      responses:
        '200':
          description: Successful response, message may also indicate if there is a parital refund, if applicable
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cancellation in progress. Partial credits have been refunded.
        '204':
          description: Successful response, already canceled or in progress
        '400':
          $ref: '#/components/responses/VideoBadRequest'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '404':
          $ref: '#/components/responses/VideoNotFound'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
  /video/{requestId}/media:
    delete:
      tags:
      - Delete Files
      summary: Delete Video Files
      operationId: DeleteVideoFiles
      description: 'This endpoint will delete your source and enhanced video files associated with the request from Topaz Labs storage, if any exists.


        Note: All videos are automatically deleted after 7 days unless you request a shorter TTL.

        '
      security:
      - apiKey: []
      parameters:
      - in: path
        name: requestId
        schema:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        required: true
      responses:
        '204':
          description: Successful response, already canceled or in progress
        '400':
          $ref: '#/components/responses/VideoBadRequest'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '404':
          $ref: '#/components/responses/VideoNotFound'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
  /video/{requestId}/status:
    get:
      tags:
      - Get Request Status
      summary: Get Video Request Status
      operationId: GetVideoRequestStatus
      description: 'Get status of the request.


        If processing is complete, the response will include a signed URL to access the enhanced video.


        Make sure to download and save the video within the TTL provided in the response (24 hours by default). New URLs with new TTL can be generated by calling this endpoint, but we retain your data for
        only a limited number of days. The video will be permanently deleted from our system afterwards.


        ## Response body


        | **Property**         | **Type**  | **Description**                                   |

        |---------------------|----------|-----------------------------------------------------|

        | **status**           | String   | Current processing status                          |

        | **progress**         | Number   | Total request progress (percentage)                |

        | **estimates**        | Object   | Refer to **RequestEstimates**                      |

        | **outputSize**       | String   | Size of output video                               |

        | **averageFps**       | Number   | Average FPS of processing nodes                    |

        | **combinedFps**      | Number   | Combined FPS of all nodes                          |

        | **processingJobs**   | Array    | Refer to **VideoProcessingStatIntermediate** below   |

        | **download**         | Object   | Refer to **EnhancedDownloadSignedUrlResponse** below |


        ---


        #### RequestEstimates


        `cost` and `time` are arrays with two integers each, representing lower and upper bounds of the estimate.


        | **Property**  | **Type**  | **Description**                                    |

        |---------------|----------|-----------------------------------------------------|

        | **cost**      | Array    | Cost range (in credits)                             |

        | **time**      | Array    | Time range (in seconds)                             |


        ---


        #### VideoProcessingStatIntermediate


        | **Property**         | **Type**  | **Description**                                   |

        |---------------------|----------|-----------------------------------------------------|

        | **chunkId**          | UUID     | Unique chunk identifier                            |

        | **chunkIndex**       | Integer  | Index of the chunk                                 |

        | **taskIndex**        | Integer  | Task index for chunk processing                    |

        | **status**           | String   | Status (queued, processing, complete, etc.)        |

        | **gpuUtilization**   | Integer  | GPU utilization in percentage                      |

        | **gpuMemoryUtilization** | Integer | GPU memory usage percentage                     |

        | **fps**              | Number   | Processing speed of the node                       |

        | **progress**         | Number   | Processing progress (percentage)                   |


        ---


        #### EnhancedDownloadSignedUrlResponse


        | **Property**   | **Type**  | **Description**                 |

        |----------------|-----------|---------------------------------|

        | **url**        | String    | Signed download URL for the enhanced file |

        | **expiresIn**  | Integer   | TTL in milliseconds                  |

        | **expiresAt**  | Integer   | Time in milliseconds since UTC epoch |

        '
      security:
      - apiKey: []
      parameters:
      - in: path
        name: requestId
        schema:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoStatusResponse'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '404':
          $ref: '#/components/responses/VideoNotFound'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
  /video/{requestId}/metrics:
    get:
      tags:
      - Get Request Metrics
      summary: Get Video Request Metrics
      operationId: GetVideoRequestMetrics
      description: 'Get metrics for the request


        ## Response body


        | **Property**        | **Type** | **Description**                                     |

        |---------------------|----------|-----------------------------------------------------|

        | **minutesInState**  | Object   | Minutes spent in various processing states          |

        | **minutesInState.pendingSourceUpload** | Number    | - |

        | **minutesInState.initializing**        | Number    | - |

        | **minutesInState.preprocessing**       | Number    | - |

        | **minutesInState.processing**          | Number    | - |

        | **minutesInState.postprocessing**      | Number    | - |

        | **minutesToEnhance**| Number   | Time to complete enhancement after source upload    |

        | **inputFrames**     | Integer  | Number of input frames                              |

        | **outputFrames**    | Integer  | Number of output frames                             |

        | **inputSize**       | String   | Size of input video                                 |

        | **outputSize**      | String   | Size of output video                                |

        | **chunks**          | Array    | Refer to **VideoChunkMetrics** below                |


        ---


        #### VideoChunkMetrics


        | **Property**        | **Type**   | **Description**                                  |

        |---------------------|------------|--------------------------------------------------|

        | **chunkIndex**                | Integer   | Index of the chunk                      |

        | **tasks**                     | Array     | List of processing tasks for the chunk  |

        | **tasks.*.minutesProcessing** | Number    | Duration of processing in minutes       |

        | **tasks.*.inputFrames**       | Integer   | Number of input frames                  |

        | **tasks.*.outputFrames**      | Integer   | Number of output frames                 |

        | **tasks.*.inputSize**         | String    | Size of the input file                  |

        | **tasks.*.outputSize**        | String    | Size of the output file                 |

        '
      security:
      - apiKey: []
      parameters:
      - in: path
        name: requestId
        schema:
          type: string
          format: uuid
          example: c1f96dc2-c448-00e6-82ed-14ecb6403c62
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '404':
          $ref: '#/components/responses/VideoNotFound'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
  /video/history:
    get:
      tags:
      - Get Request History
      summary: Get My Request History
      operationId: GetHistory
      description: 'This endpoint will return your processing history.

        '
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/HistoryResponse'
        '401':
          $ref: '#/components/responses/VideoUnauthorized'
        '403':
          $ref: '#/components/responses/VideoForbidden'
        '500':
          $ref: '#/components/responses/VideoInternalServerError'
components:
  schemas:
    EnhanceGANRequest:
      type: object
      properties:
        image:
          type: string
          contentMediaType: application/octet-stream
          description: "The image file to be processed. Supported formats:\n  - jpeg (or jpg)\n  - png\n  - tiff (or tif)\n"
        source_id:
          type: string
          description: Unique identifier of the source image.
          examples:
          - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        source_url:
          type: string
          description: The URL of the source image.
          examples:
          - https://example.com/image.jpg
        model:
          type: string
          description: The model to use for processing the image.
          enum:
          - Standard V2
          - Low Resolution V2
          - CGI
          - High Fidelity V2
          - Text Refine
          default: Standard V2
        output_height:
          type: integer
          description: The desired height of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then
            the other dimension is scaled proportionally.
          minimum: 1
          maximum: 32000
          examples:
          - 1080
        output_width:
          type: integer
          description: The desired width of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then
            the other dimension is scaled proportionally.
          minimum: 1
          maximum: 32000
          examples:
          - 1920
        crop_to_fill:
          type: boolean
          description: Default behavior is to letterbox the image if a differing aspect ratio is chosen. Enable `crop_to_fill` by setting this to `true` if you instead want to crop the image to fill the
            dimensions.
          default: false
        output_format:
          type: string
          description: The desired format of the output image.
          enum:
          - jpeg
          - jpg
          - png
          - tiff
          - tif
          default: jpeg
        webhook_url:
          type: string
          description: "The URL to send the webhook to. When provided, a POST request with a JSON payload will be sent to this URL when the job status changes or completes.\n\n**Request Body:**\nThe webhook\
            \ will be sent as a POST request with `Content-Type: application/json` containing the following fields:\n  - `notification_id` (string, ULID): Unique identifier for this notification. Can be\
            \ used to order messages in case they are received out of order; see the [ULID specification](https://github.com/ulid/spec)\n  - `process_id` (string, UUID): Unique identifier of the image processing\
            \ job.\n  - `status` (string): Current status of the job (i.e., \"Pending\", \"Processing\", \"Completed\", \"Cancelled\", \"Failed\").\n  - `creation_time` (integer): Unix timestamp in seconds\
            \ when the job was created.\n  - `modification_time` (integer): Unix timestamp in seconds when the job was last modified.\n  - `progress` (integer): Progress of the job as a percentage (0-100).\n\
            \  - `download_url` (string, optional): Presigned GET URL for the processed image. Only present once the job is completed.\n  - `head_url` (string, optional): Presigned HEAD URL for the processed\
            \ image. Only present once the job is completed.\n  - `input_download_url` (string): Presigned GET URL for the input image.\n  - `input_head_url` (string): Presigned HEAD URL for the input image.\n\
            \n**Retry Behavior:**\nIf the webhook endpoint returns a 5xx server error, the system will retry the webhook with exponential backoff. The backoff starts at 5 seconds and doubles with each retry\
            \ attempt (5s, 10s, 20s, 40s, etc.), up to a maximum of 15 minutes. Client errors (4xx status codes) are not retried and the notification is discarded.\n"
          examples:
          - https://example.com/webhook
      additionalProperties:
        type: string
        description: Additional key-value pairs to be used as model settings. Only pairs relevant for your chosen model are used. Please see the [available models](https://developer.topazlabs.com/image-api/available-models)
          for more details.
